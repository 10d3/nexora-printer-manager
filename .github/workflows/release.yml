name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Release
        run: cargo build --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexora-printer-manager-windows
          path: target/release/nexora-printer-manager.exe
          retention-days: 30

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: iscc installer/nexora-installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: nexora-installer
          path: installer/Output/nexora-printer-manager-setup.exe
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nexora-printer-manager-windows
          path: ./artifacts

      - name: Download Installer artifact
        uses: actions/download-artifact@v4
        with:
          name: nexora-installer
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Nexora Printer Manager ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            ./artifacts/nexora-printer-manager.exe
            ./artifacts/nexora-printer-manager-setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
